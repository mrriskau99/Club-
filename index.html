<script>

const club = "nashediyon-ki-toli";
const SHOW_COUNT = 3;

async function fetchJSON(url){
const res = await fetch(url);
if(!res.ok) throw new Error("HTTP "+res.status);
return res.json();
}

function getBestRating(stats){
const formats = ["chess_rapid","chess_blitz","chess_bullet","chess_daily"];
for(let f of formats){
if(stats?.[f]?.last?.rating){
return stats[f].last.rating;
}
}
return "--";
}

async function loadMembers(){

let data = await fetchJSON(`https://api.chess.com/pub/club/${club}/members`);

// ✅ MERGE ALL
let all = [
...(data.weekly || []),
...(data.monthly || []),
...(data.all_time || [])
];

// ✅ REMOVE DUPES
let seen = new Set();
let unique = all.filter(m=>{
if(seen.has(m.username)) return false;
seen.add(m.username);
return true;
});

// ✅ SORT BY REAL JOIN DATE
unique.sort((a,b)=>(b.joined||0)-(a.joined||0));

// ✅ TAKE TOP 3 (REAL LATEST)
let recent = unique.slice(0, SHOW_COUNT);

let container = document.getElementById("members");
container.innerHTML = "";

for(let i=0;i<recent.length;i++){

let username = recent[i].username;

// fetch all data together
let [profile, stats, status] = await Promise.all([
fetchJSON(`https://api.chess.com/pub/player/${username}`),
fetchJSON(`https://api.chess.com/pub/player/${username}/stats`),
fetchJSON(`https://api.chess.com/pub/player/${username}/is-online`)
]);

let avatar = profile.avatar || 'https://www.chess.com/bundles/web/images/noavatar_l.84a92436.gif';
let rating = getBestRating(stats);
let online = status.online;

// NEW badge if joined in last 24h
let isNew = (Date.now()/1000 - (recent[i].joined||0)) < 86400;

let badge = isNew ? `<div style="
font-size:9px;
color:#00ff9f;
text-shadow:0 0 6px #00ff9f;
">NEW</div>` : "";

// ===== BIG CARD =====
if(i===0){

container.innerHTML += `
<div style="
margin-bottom:12px;
padding:12px;
border-radius:18px;
background:linear-gradient(145deg,#0c1324,#05070d);
color:#dbe6ff;
border:1px solid rgba(110,168,255,0.3);
box-shadow:0 0 12px rgba(110,168,255,0.4);
animation:fadeIn .5s ease;
">

<img src="${avatar}"
style="width:70px;height:70px;border-radius:50%;margin-bottom:8px;">

<div style="font-size:13px;">${username}</div>

${badge}

<div style="font-size:10px;">Rating: ${rating}</div>

<div style="
font-size:10px;
color:${online ? '#00ff9f' : '#888'};
text-shadow:${online ? '0 0 8px #00ff9f' : 'none'};
">
● ${online ? 'ONLINE' : 'OFFLINE'}
</div>

</div>
`;

}else{

// ===== SMALL ROWS =====
container.innerHTML += `
<div style="
display:flex;
align-items:center;
padding:8px 10px;
margin-bottom:8px;
border-radius:999px;
background:linear-gradient(145deg,#0c1324,#05070d);
color:#dbe6ff;
border:1px solid rgba(110,168,255,0.3);
animation:fadeIn .5s ease;
">

<img src="${avatar}"
style="width:32px;height:32px;border-radius:50%;margin-right:10px;">

<div style="flex:1;text-align:left;font-size:12px;">
${username} ${badge}
</div>

<div style="font-size:10px;">${rating}</div>

<div style="
margin-left:6px;
width:8px;
height:8px;
border-radius:50%;
background:${online ? '#00ff9f' : '#888'};
box-shadow:${online ? '0 0 8px #00ff9f' : 'none'};
animation:${online ? 'pulse 1.5s infinite' : 'none'};
">
</div>

</div>
`;

}

}

}

// animations
const style = document.createElement("style");
style.innerHTML = `
@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.4);}
100%{transform:scale(1);}
}
@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
`;
document.head.appendChild(style);

loadMembers();
setInterval(loadMembers,30000);

</script>
