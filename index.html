<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:transparent;
  font-family:Segoe UI, Arial, sans-serif;
}

.widget{
  width:100%;
  padding:12px;
  border-radius:20px;
  background:rgba(240,245,255,0.74);
  border:1px solid rgba(110,168,255,0.24);
  box-shadow:
    0 12px 28px rgba(0,0,0,0.16),
    0 0 18px rgba(110,168,255,0.10);
  backdrop-filter:blur(10px);
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:10px;
  padding:10px 10px 9px;
  border-radius:15px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0)),
    linear-gradient(145deg,#0d1426,#060910);
  border:1px solid rgba(110,168,255,0.22);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 6px 16px rgba(0,0,0,0.28),
    0 0 14px rgba(110,168,255,0.10);
}

.title{
  font-size:12px;
  letter-spacing:2px;
  font-weight:800;
  color:#eaf2ff;
  text-transform:uppercase;
  text-shadow:
    0 0 8px rgba(110,168,255,0.75),
    0 0 16px rgba(110,168,255,0.42),
    0 0 24px rgba(110,168,255,0.18);
  margin-bottom:4px;
}

.subtitle{
  font-size:9px;
  color:#9fb7e8;
  opacity:.96;
  letter-spacing:.35px;
  line-height:1.3;
}

/* CARD */
.card{
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 11px;
  margin:6px 0;
  border-radius:16px;
  cursor:pointer;
  transform-origin:center;
  -webkit-tap-highlight-color:transparent;

  background:
    linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0)),
    linear-gradient(145deg,#0d1426,#060910);
  border:1px solid rgba(110,168,255,0.18);
  color:#dbe6ff;

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.06),
    inset 0 -1px 0 rgba(255,255,255,0.02),
    0 6px 16px rgba(0,0,0,0.38);

  transition:
    transform 0.42s cubic-bezier(0.22,1,0.36,1),
    box-shadow 0.42s cubic-bezier(0.22,1,0.36,1),
    border-color 0.35s ease,
    filter 0.35s ease;
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  pointer-events:none;
  background:radial-gradient(circle at top center, rgba(110,168,255,0.14), transparent 62%);
  opacity:0;
  transition:opacity 0.4s ease;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:
    0 14px 26px rgba(0,0,0,0.46),
    0 0 18px rgba(110,168,255,0.22);
  border-color:rgba(110,168,255,0.40);
  filter:brightness(1.03);
}

.card:hover::before{
  opacity:1;
}

.card:active{
  transform:translateY(-1px) scale(0.97);
  transition:transform 0.13s ease, box-shadow 0.13s ease;
}

/* AVATAR */
.avatar-wrap{
  position:relative;
  flex:0 0 auto;
  transition:transform 0.38s cubic-bezier(0.22,1,0.36,1);
}

.avatar{
  display:block;
  width:42px;
  height:42px;
  border-radius:50%;
  border:2px solid rgba(110,168,255,0.42);
  object-fit:cover;
  object-position:center;
  background:linear-gradient(145deg,#101827,#0a0f18);
  box-shadow:
    0 0 0 3px rgba(110,168,255,0.08),
    0 6px 14px rgba(0,0,0,0.28);
  transition:
    transform 0.38s cubic-bezier(0.22,1,0.36,1),
    box-shadow 0.38s ease,
    border-color 0.35s ease;
}

.card:hover .avatar-wrap{
  transform:translateY(-1px);
}

.card:hover .avatar{
  transform:scale(1.03);
  border-color:rgba(140,190,255,0.78);
  box-shadow:
    0 0 0 4px rgba(110,168,255,0.08),
    0 0 14px rgba(110,168,255,0.22),
    0 8px 18px rgba(0,0,0,0.34);
}

.status{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  bottom:2px;
  right:2px;
  z-index:2;
  box-shadow:0 0 0 2px #08101c;
}

.online{
  background:#22c55e;
  box-shadow:
    0 0 0 2px #08101c,
    0 0 8px rgba(34,197,94,0.72);
}

.offline{
  background:#4b5563;
}

.badge{
  position:absolute;
  top:7px;
  right:8px;
  font-size:8px;
  padding:3px 6px;
  border-radius:999px;
  background:linear-gradient(135deg,#2dd46f,#16a34a);
  color:#fff;
  letter-spacing:1px;
  box-shadow:
    0 0 10px rgba(34,197,94,0.45),
    0 5px 10px rgba(0,0,0,0.18);
  animation:badgeFade 6s forwards;
}

@keyframes badgeFade{
  0%{opacity:1;transform:translateY(0);}
  70%{opacity:1;transform:translateY(0);}
  100%{opacity:0;transform:translateY(-3px);}
}

.info{
  min-width:0;
  flex:1;
}

.name{
  font-size:11px;
  font-weight:650;
  letter-spacing:.2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.rating{
  font-size:9px;
  opacity:.78;
  margin-top:1px;
}

.time{
  font-size:8px;
  opacity:.58;
  margin-top:1px;
}

.fade{
  opacity:0;
  transform:translateY(12px);
  animation:reveal 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
}

@keyframes reveal{
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>

<div class="widget">
  <div class="header">
    <div class="title">N.K.T. FRESH FACES</div>
    <div class="subtitle">Welcoming the newest additions to the toli ✦</div>
  </div>
  <div id="members"></div>
</div>

<script>
const CLUB = "nashediyon-ki-toli";
let prevUsers = [];

async function fetchJSON(url){
  const res = await fetch(url);
  return res.json();
}

function getBest(stats){
  const map = {
    chess_rapid: "Rapid",
    chess_blitz: "Blitz",
    chess_bullet: "Bullet"
  };

  let best = null;

  for(const key in map){
    const rating = stats?.[key]?.last?.rating;
    if(rating && (!best || rating > best.r)){
      best = { t: map[key], r: rating };
    }
  }

  return best ? `${best.t}: ${best.r}` : "Unrated";
}

function timeAgo(ts){
  const diff = Math.floor((Date.now()/1000) - ts);
  if(diff < 60) return diff + "s ago";
  if(diff < 3600) return Math.floor(diff/60) + "m ago";
  if(diff < 86400) return Math.floor(diff/3600) + "h ago";
  return Math.floor(diff/86400) + "d ago";
}

function avatarHTML(src, username){
  const safeSrc = src && src.trim()
    ? src
    : "https://images.chesscomfiles.com/uploads/v1/user/default_avatar.192.gif";

  return `<img class="avatar" src="${safeSrc}" alt="${username}'s avatar" loading="lazy" referrerpolicy="no-referrer">`;
}

function memberCard(user, delay = 0){
  return `
    <div class="card fade" style="animation-delay:${delay}s"
      onclick="window.open('https://www.chess.com/member/${user.u}','_blank')">

      <div class="badge">FRESH</div>

      <div class="avatar-wrap">
        ${avatarHTML(user.a, user.u)}
        <div class="status ${user.on ? 'online' : 'offline'}"></div>
      </div>

      <div class="info">
        <div class="name">@${user.u}</div>
        <div class="rating">${user.r}</div>
        <div class="time">${timeAgo(user.j)}</div>
      </div>
    </div>
  `;
}

async function load(){
  try{
    const club = await fetchJSON(`https://api.chess.com/pub/club/${CLUB}/members`);
    let all = [...club.weekly, ...club.monthly, ...club.all_time];

    const seen = new Set();
    all = all.filter(member => !seen.has(member.username) && seen.add(member.username));
    all.sort((a,b) => b.joined - a.joined);

    const top = all.slice(0,3);

    const users = await Promise.all(top.map(async member => {
      try{
        const [profile, stats, online] = await Promise.all([
          fetchJSON(`https://api.chess.com/pub/player/${member.username}`),
          fetchJSON(`https://api.chess.com/pub/player/${member.username}/stats`),
          fetchJSON(`https://api.chess.com/pub/player/${member.username}/is-online`)
        ]);

        return {
          u: member.username,
          a: profile.avatar,
          r: getBest(stats),
          on: online.online,
          j: member.joined
        };
      }catch{
        return {
          u: member.username,
          a: "",
          r: "Unrated",
          on: false,
          j: member.joined
        };
      }
    }));

    const current = users.map(x => x.u).join(",");
    const previous = prevUsers.join(",");

    if(current !== previous){
      prevUsers = users.map(x => x.u);
      document.getElementById("members").innerHTML =
        users.map((user, i) => memberCard(user, i * 0.08)).join("");
    }
  }catch(err){
    console.error("Widget load failed:", err);
  }
}

load();
setInterval(load, 20000);
</script>
